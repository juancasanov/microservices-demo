name: CI/CD Development Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  built-vote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx       
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Vote
        uses: docker/build-push-action@v5
        with:
          context: ./vote
          platforms: linux/amd64        
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/voting-app-vote:latest
            ${{ secrets.DOCKER_USERNAME }}/voting-app-vote:${{ github.sha }}

  build-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          platforms: linux/amd64    
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/voting-app-worker:latest
            ${{ secrets.DOCKER_USERNAME }}/voting-app-worker:${{ github.sha }}

  build-result:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Result
        uses: docker/build-push-action@v5
        with:
          context: ./result
          platforms: linux/amd64      
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/voting-app-result:latest
            ${{ secrets.DOCKER_USERNAME }}/voting-app-result:${{ github.sha }}
