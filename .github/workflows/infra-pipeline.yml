name: Infrastructure Pipeline

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Connect to AKS
        uses: azure/aks-set-context@v3
        with:
          resource-group: rg-voting-app
          cluster-name: aks-voting-app

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Deploy Kafka and PostgreSQL
        run: |
          helm upgrade --install infrastructure ./infrastructure \
            --values ./infrastructure/values.yaml \
            --wait \
            --timeout 5m

      - name: Deploy Vote
        run: |
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: vote
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: vote
            template:
              metadata:
                labels:
                  app: vote
              spec:
                containers:
                - name: vote
                  image: ${{ secrets.DOCKER_USERNAME }}/voting-app-vote:latest
                  ports:
                  - containerPort: 8080
                  env:
                  - name: KAFKA_BROKERS
                    value: "kafka:9092"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: vote
          spec:
            type: LoadBalancer
            selector:
              app: vote
            ports:
            - port: 80
              targetPort: 8080
          EOF

      - name: Deploy Worker
        run: |
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: worker
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: worker
            template:
              metadata:
                labels:
                  app: worker
              spec:
                containers:
                - name: worker
                  image: ${{ secrets.DOCKER_USERNAME }}/voting-app-worker:latest
                  env:
                  - name: KAFKA_BROKERS
                    value: "kafka:9092"
                  - name: DB_HOST
                    value: "postgresql"
                  - name: DB_PORT 
                    value: "5432"
                  - name: POSTGRES_USER
                    value: "postgres"
                  - name: POSTGRES_PASSWORD
                    value: "postgres"
          EOF

      - name: Deploy Result
        run: |
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: result
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: result
            template:
              metadata:
                labels:
                  app: result
              spec:
                containers:
                - name: result
                  image: ${{ secrets.DOCKER_USERNAME }}/voting-app-result:latest
                  ports:
                  - containerPort: 80
                  env: 
                  - name: DB_HOST
                    value: "postgresql"
                  - name: DB_USER
                    value: "postgres"
                  - name: DB_PASS
                    value: "postgres"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: result
          spec:
            type: LoadBalancer
            selector:
              app: result
            ports:
            - port: 80
              targetPort: 80
          EOF

      - name: Verify Deployment
        run: |
          kubectl get pods
          kubectl get services
