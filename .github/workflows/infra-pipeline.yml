name: Infrastructure Pipeline

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Connect to AKS
        uses: azure/aks-set-context@v3
        with:
          resource-group: rg-voting-app
          cluster-name: aks-voting-app

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Deploy Kafka and PostgreSQL
        run: |
          helm upgrade --install infrastructure ./infrastructure \
            --values ./infrastructure/values.yaml \
            --wait \
            --timeout 5m

      - name: Deploy Vote
        run: |
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: vote
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: vote
            template:
              metadata:
                labels:
                  app: vote
              spec:
                containers:
                - name: vote
                  image: ${{ secrets.DOCKER_USERNAME }}/voting-app-vote:latest
                  ports:
                  - containerPort: 8080
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: vote
          spec:
            type: LoadBalancer
            selector:
              app: vote
            ports:
            - port: 80
              targetPort: 8080
          EOF

      - name: Deploy Worker
        run: |
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: worker
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: worker
            template:
              metadata:
                labels:
                  app: worker
              spec:
                containers:
                - name: worker
                  image: ${{ secrets.DOCKER_USERNAME }}/voting-app-worker:latest
          EOF

      - name: Deploy Result
        run: |
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: result
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: result
            template:
              metadata:
                labels:
                  app: result
              spec:
                containers:
                - name: result
                  image: ${{ secrets.DOCKER_USERNAME }}/voting-app-result:latest
                  ports:
                  - containerPort: 80
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: result
          spec:
            type: LoadBalancer
            selector:
              app: result
            ports:
            - port: 80
              targetPort: 80
          EOF

      - name: Verify Deployment
        run: |
          kubectl get pods
          kubectl get services